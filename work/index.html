{key:'xizi',name:'西子舞蹈学院',sect:'七秀',icon:'💃',slogan:'一落地就自带聚光灯。',traits:`你是那种走进教室就会被注意到的人，审美在线，情绪表达也很到位。无论是舞台汇演、社团招新还是打本站位，你都知道怎样把场面撑得漂亮又有记忆点。你不只是爱发光，更擅长让身边的人一起变得好看、顺畅、像排练过一样有秩序。你对氛围和细节都敏感，连交作业都像在完成一次精致谢幕，属于“人群里永远很上镜”的学院代表。\n${RESULT_CTA}`,major:'舞蹈编导',club:'古风舞社',keywords:['高颜值','会来事','镜头感']},
{key:'qingyan',name:'青岩医学院',sect:'万花',icon:'🌸',slogan:'手稳心细，救场第一名。',traits:`你表面温柔安静，实际是非常能扛事的那一类人。别人慌的时候，你已经开始判断问题出在哪、先处理哪一步最稳。你很擅长照顾同伴，也很会把复杂局面拆成能执行的小步骤，所以无论是在课堂汇报、宿舍危机还是副本翻车现场，大家都会本能地向你求助。你身上有一种“被你接住就会安心”的气质，细腻、克制，又带着万花式的从容和分寸感。\n${RESULT_CTA}`,major:'临床医学',club:'校园急救社',keywords:['细腻','稳准','治愈系']},
{key:'miaojiang',name:'苗疆生物研究所',sect:'五毒',icon:'🐍',slogan:'神秘感和脑洞都养得很好。',traits:`你自带一点不好被看透的气场，看起来冷冷的，其实对感兴趣的东西会投入得非常深。你偏爱少数派路线，也总能在别人忽略的角落里发现新鲜感，所以很适合那些带点研究欲、冒险感和审美偏门的领域。你不是最爱抢话的人，但一开口常常就很有个人风格，让人记住。你的吸引力来自反差感，像五毒门下一样，自由、锋利、带一点危险又迷人的生机。\n${RESULT_CTA}`,major:'生物工程',club:'昆虫观察社',keywords:['神秘','有趣','反差感']},
{key:'qiandao',name:'千岛音乐学院',sect:'长歌',icon:'🎵',slogan:'你的人设像一首有后劲的歌。',traits:`你很会表达，也很会感受别人没说出口的情绪。很多普通聊天到了你这里，都会变成有气氛、有层次、有画面感的交流现场。你擅长用语言、声音和节奏把人与人之间的距离悄悄拉近，所以无论在校园广播、社团活动还是亲友群里，你都像是天然的气氛调音师。你不一定最吵，但总能把现场调整到舒服又好听的频率，属于那种“越相处越有余韵”的长歌型同学。\n${RESULT_CTA}`,major:'音乐制作',club:'广播台',keywords:['浪漫','会聊天','气氛组']},
{key:'huashan',name:'华山道教学院',sect:'纯阳',icon:'☁️',slogan:'你负责清醒，也负责仙。',traits:`你有很强的独立脑回路，很多事情不急着跟风，而是习惯先在自己的节奏里想明白。你看起来安静、克制，甚至有点不好接近，但熟了之后会发现你其实很有趣，而且经常能讲出让人瞬间清醒的话。你不喜欢无效热闹，更重视精神秩序和内在判断，所以无论是学业安排、生活选择还是门派偏好，你都偏向“先想透再出手”。你身上有纯阳系的疏离感，也有令人安心的稳定边界。\n${RESULT_CTA}`,major:'哲学',club:'天文社',keywords:['清醒','独立','仙气']},
{key:'police',name:'首都警察学院',sect:'天策',icon:'🛡️',slogan:'场面一乱，你就会自动上线。',traits:`你是那种一遇到突发情况，状态反而更好的类型。别人还在问怎么办，你已经开始接任务、分步骤、稳住局面。你执行力强，责任心也重，对同伴天然带着保护欲，所以无论是小组作业、活动落地还是副本拉怪，你都很像那个让人放心把后背交出去的人。你不一定永远站在最显眼的位置，但关键时刻一定会顶上去。天策气质在你身上体现得很明显，就是正面、利落、靠谱又能冲。\n${RESULT_CTA}`,major:'侦查学',club:'国旗护卫队',keywords:['可靠','能扛事','正面刚']},
{key:'finance',name:'西湖财经大学',sect:'藏剑',icon:'💰',slogan:'美貌和目标感都不打折。',traits:`你很懂什么叫“值得”，也很懂怎样把喜欢的事情做得漂亮又体面。无论是穿搭、审美、社交还是做事方式，你都有自己的标准，而且通常不低。你不是单纯图好看，而是擅长把排面、效率和结果感平衡得很好，所以常常给人一种“既精致又很会经营自己人生”的印象。你选专业、做项目、冲活动时都带着明确目标感，像藏剑一样讲究风格，也讲究实力，属于会发光也会算账的那种厉害同学。\n${RESULT_CTA}`,major:'金融学',club:'品牌策划社',keywords:['精致','有标准','会经营']},
{key:'cat',name:'西域猫科研究所',sect:'明教',icon:'🐱',slogan:'天生就有不按常理出牌的天赋。',traits:`你最迷人的地方，是永远有一套别人猜不到的节奏。你反应快、胆子大，对新鲜东西接受度很高，遇到突发状况也很少慌，反而会觉得有点刺激。你讨厌被困在太死板的规则里，更喜欢自由发挥、边试边跑出自己的路线，所以在校园里总显得机灵、灵活又有点野。你有明教式的松弛和锐气，不一定按常规出牌，但常常能用最特别的方法把事情做成，让人又意外又服气。\n${RESULT_CTA}`,major:'动物行为学',club:'街舞社',keywords:['灵活','野性','高机动']},
{key:'planet',name:'大漠行星研究所',sect:'衍天',icon:'🔮',slogan:'你看问题，总比别人多一层。',traits:`你对情绪、氛围和细微变化的感知力很强，很多别人还没意识到的苗头，你已经提前捕捉到了。你喜欢观察，也擅长把表面现象和背后的逻辑连起来，所以常常显得很有预感、很会看人，也很会看局势。你不一定总是高调发言，但一旦说出口，往往就是别人会记住的那一句。你像衍天门下那样，带着一点神秘和超前感，适合做校园里最会看暗线、最能猜中下一步剧情发展的人。\n${RESULT_CTA}`,major:'天体物理',club:'观星社',keywords:['洞察力','神秘','有预感']},
{key:'pharma',name:'长白山药科大学',sect:'药宗',icon:'💊',slogan:'你的细致，是能被依赖的那种。',traits:`你给人的安心感，不是靠嘴上安慰，而是靠实打实的照顾和补位。你会记得别人忘掉的小事，也会默默把很多容易出问题的细节提前处理好，所以在集体里特别像那个稳定运转的后勤核心。你不一定抢风头，但只要你在，很多事情就会顺很多。你有药宗式的温和与耐心，也有很强的责任感，属于那种平时不吵不闹，关键时刻却总能稳稳托住全场节奏的人。\n${RESULT_CTA}`,major:'药学',club:'志愿者协会',keywords:['细心','温和','后勤王']},
{key:'ocean',name:'东海海洋大学',sect:'蓬莱',icon:'🌊',slogan:'你像海风，张扬又不失松弛。',traits:`你很会给日常加一点浪头。别人觉得普通的安排，到了你手里总能多出新意、画面和记忆点。你脑洞大，出场感也强，喜欢让生活保持一点轻盈的戏剧性，所以无论做活动、玩梗、拍照还是组织一场说走就走的校园外拍，你都很有天赋。你不是刻意抢镜，而是天然会让现场热起来。蓬莱气质在你身上很明显，就是灵动、张扬、带点海风一样的自由感，让人一靠近就觉得有趣。\n${RESULT_CTA}`,major:'海洋科学',club:'航模社',keywords:['张力','脑洞大','会整活']},
{key:'shaolin',name:'嵩山武术学院',sect:'少林',icon:'🙏',slogan:'稳得住，沉得下。',traits:`你可能不是最爱表现自己的那一个，但真正轮到你上场时，大家都会发现你很扎实。你对节奏、纪律和长期积累有天然耐心，不爱搞花架子，更相信基本功和持续输出的力量。所以无论是准备考试、推进训练还是处理关系，你都倾向于一步一步做到位。你给人的感觉很稳，甚至有点佛系，但不是没锋芒，而是把力量都收进了骨子里。少林式的可靠、自律和沉着，在你身上有一种很耐看的分量。\n${RESULT_CTA}`,major:'武术教育',club:'晨练社',keywords:['沉稳','自律','基本功']},
{key:'drama',name:'闽南戏剧学院',sect:'无相',icon:'🎭',slogan:'你不是在发光，就是在组织别人发光。',traits:`你很懂场面，也很懂人。你知道什么时候该接梗，什么时候该抛出情绪点，什么时候又该把别人推到聚光灯下，所以你做活动、串流程、组织节目时总是很有戏感。你不只是爱热闹，更擅长把热闹变成一场有节奏、有记忆点的完整表演。你像无相一样灵活、会控场，也有很强的角色切换能力，在不同人群里都能快速找到合适的位置，是典型的“全场气氛和亮点制造机”。\n${RESULT_CTA}`,major:'戏剧影视文学',club:'话剧社',keywords:['会带人','戏感','控场']},
{key:'info',name:'太白山信息学院',sect:'凌雪',icon:'❄️',slogan:'冷静是你的外套，效率是你的底色。',traits:`你不太依赖热闹来证明存在感，真正让人记住你的，是那种稳定、精准又有效的完成度。你话不一定多，但观察很细，判断也快，通常能在别人还没理清问题时就直接切中重点。你适合做技术、做系统、做那些需要冷静脑子的事情，也很像凌雪门下一样，外表克制，出手利落。你不靠夸张存在，而是靠结果说话，是那种平时低调、关键时刻特别让人放心的高效率型同学。\n${RESULT_CTA}`,major:'信息安全',club:'程序设计社',keywords:['冷静','技术流','效率高']},
{key:'tech',name:'舟山理工大学',sect:'刀宗',icon:'⚔️',slogan:'你身上有很纯粹的行动派气息。',traits:`你最不怕的就是“先上手试试”。很多人还在犹豫、评估、做心理建设时，你已经把第一步迈出去了。你对挑战有天然兴奋感，越是需要硬碰硬、越需要执行力和即时反应的事，你反而越容易进入状态。无论是实验课、球场对抗还是竞技场对线，你都带着很强的进攻意识和冲劲。你像刀宗那样直接、硬朗、不拖泥带水，属于那种一旦认准目标，就会非常利索地狠狠干到底的人。\n${RESULT_CTA}`,major:'机械工程',club:'格斗社',keywords:['行动派','好胜','硬核']},
{key:'weapon',name:'太行兵器研究所',sect:'霸刀',icon:'🗡️',slogan:'你做事，有一种很重的压场感。',traits:`你很有拍板能力，也很有推进事情落地的执行气场。别人可能还在讨论能不能做、要不要做，你已经开始判断资源、分配节奏、推进到下一步了。你身上有明显的主心骨气质，不是靠大声，而是靠稳定的决策和很强的落地感把场子压住。你适合做负责人、发起人、推进人，也像霸刀那样带着强烈的果断与力度。很多事情只要交给你，大家就会默认这事真的会被办成。\n${RESULT_CTA}`,major:'武器系统工程',club:'学生会',keywords:['压场','果断','推进力']},
{key:'defense',name:'首都国防大学',sect:'苍云',icon:'🏰',slogan:'安全感本身，就是你的超能力。',traits:`你不一定是最会说漂亮话的人，但你一定是最容易让人安心的人。你很能扛压，也很能守住节奏，很多别人扛不住的情绪和责任到了你这里，都会被稳稳接住。朋友和队友会自然把后背交给你，因为你给人的感觉就是“有你在，事情不会散”。你像苍云门下一样，厚重、沉着、可靠，有很强的守护本能。你未必总站在最前排发声，但一定是那个最值得依赖的坚实存在。\n${RESULT_CTA}`,major:'国防教育',club:'户外社',keywords:['安全感','抗压','守护型']},
{key:'agri',name:'岭南农业大学',sect:'万灵',icon:'🦌',slogan:'自由、鲜活、很会让人放松。',traits:`你身上有一种很轻盈的生命力，像春天的风一样，走到哪里都能让空气松一点、亮一点。你不喜欢太僵硬的规则，更擅长在自然、舒服、没有压力的状态里把生活过得有趣。你会注意到很多别人忽略的小快乐，也常常能带着身边人一起去发现新鲜事。你像万灵那样自由、亲和、灵动，不一定最吵，却很容易让人愿意靠近。和你相处，会有一种“今天好像突然变好过了”的感觉。\n${RESULT_CTA}`,major:'园林学',club:'植物社',keywords:['鲜活','亲和','自由感']},
{key:'mech',name:'成都机械学院',sect:'唐门',icon:'🎯',slogan:'不声不响，但一出手就是有效答案。',traits:`你擅长观察、判断和把事情做到非常精确。很多人靠热情推进，你更靠结构、细节和完成度说话，所以常常在不怎么张扬的情况下，交出最让人闭嘴的成果。你做事喜欢可控、严谨、有逻辑，也不太爱把情绪外放，给人的印象通常是低调但很硬。你像唐门那样克制、精准、带一点距离感，可一旦真的出手，就会让人立刻意识到你的实力。你属于典型的“平静但危险”的高质量选手。\n${RESULT_CTA}`,major:'机械设计',club:'模型社',keywords:['精准','低调','完成度']},
{key:'sports',name:'君山体育大学',sect:'丐帮',icon:'🍺',slogan:'你的人生观主打一个痛快。',traits:`你最大的魅力，是那种一点都不拧巴的生命力。你很会玩，也很会带着别人一起玩，普通聚会到了你这里常常就会自动升级成高能现场。你讲义气、反应快、气氛感强，不喜欢把事情想得太复杂，更相信“先活起来再说”。所以在校园里，你通常是最能让周围热起来的人之一。你像丐帮一样松弛、热闹、很接地气，身上有一种特别适合交朋友、适合并肩闯祸也适合一起开心的痛快劲儿。\n${RESULT_CTA}`,major:'体育教育',club:'滑板社',keywords:['松弛','讲义气','有趣']},
{key:'ethnic',name:'南诏民族大学',sect:'段氏',icon:'🌺',slogan:'优雅是外显，亲和力是内核。',traits:`你给人的第一印象通常很好，因为你天然懂分寸，也懂场面。你知道怎样让别人舒服，怎样让一群人相处得体面又不尴尬，所以无论是活动现场、班级合作还是朋友聚会，你都很容易成为稳定气氛的关键人物。你不是那种咄咄逼人的存在，而是靠温和、体贴和很自然的号召力站住位置。你像段氏气质一样，外表优雅，内里柔和，却并不软弱，是那种合照里站得住 C 位、现实里也很让人喜欢的同学。\n${RESULT_CTA}`,major:'民族学',club:'礼仪队',keywords:['体面','温和','有号召力']}
];

const STORAGE_KEYS={ranking:'xia_ke_ling_academy_ranking_v2',result:'xia_ke_ling_academy_result_v2',submitted:'xia_ke_ling_submitted_v2',client:'xia_ke_ling_client_v2'};
let currentQuestion=0,currentScores={},currentResult=null,currentRanking=null,isSelecting=false,userProfile={nickname:'',avatar:''};
const shareState={env:null,wechatReady:false,wechatConfigUrl:'',wechatInitPromise:null};
function getClientId(){let id=localStorage.getItem(STORAGE_KEYS.client);if(!id){id='client_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem(STORAGE_KEYS.client,id)}return id}
function createInitialScores(){return Object.fromEntries(ACADEMIES.map(item=>[item.key,0]))}
function showPage(pageId){document.querySelectorAll('.page').forEach(page=>page.classList.remove('active'));document.getElementById(pageId).classList.add('active');window.scrollTo(0,0)}
function getDisplayName(){const name=(document.getElementById('nickname-input').value||'').trim();return name||'未命名同学'}
function detectShareEnv(){if(shareState.env)return shareState.env;const ua=navigator.userAgent||'';shareState.env={isWechat:/MicroMessenger/i.test(ua),isQQ:/\bQQ\/[\d.]+/i.test(ua),isMobile:/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)};return shareState.env}
function getShareLink(){return SHARE_CONFIG.shareLink||`${window.location.origin}${window.location.pathname}`}
function getShareImageUrl(){if(/^https?:\/\//i.test(SHARE_CONFIG.defaultImageUrl))return SHARE_CONFIG.defaultImageUrl;if(SHARE_CONFIG.defaultImageUrl)return `${window.location.origin}${SHARE_CONFIG.defaultImageUrl}`;return `${window.location.origin}/static/share-cover.png`}
function getShareTitle(){return currentResult?`${currentResult.academyName}｜下课铃剑三大学城录取结果`:'下课铃剑三大学城测试'}
function getShareDesc(){if(!currentResult)return '测测你在剑三大学城会被分进哪所学院。';return `${currentResult.sectName}门派气质已确认，看看你的专属学生证结果。`}
function getCanonicalPageUrl(){return window.location.href.split('#')[0]}
async function fetchJson(url,options={}){const response=await fetchWithTimeout(url,options);if(!response.ok)throw new Error(`request failed: ${response.status}`);return response.json()}
async function getWechatSignature(url){const requestUrl=`${SHARE_CONFIG.wechatSignUrl}?url=${encodeURIComponent(url)}`;return fetchJson(requestUrl)}
function callWechatShare(method,payload){return new Promise(resolve=>{try{if(typeof wx==="undefined"||typeof wx[method]!=="function"){resolve(false);return}wx[method]({...payload,success:()=>resolve(true),fail:()=>resolve(false),cancel:()=>resolve(false)});}catch(error){resolve(false)}})}
async function applyWechatShareData(){const ready=await initWechatShare();if(!ready)return false;const link=getShareLink();const imgUrl=getShareImageUrl();const title=getShareTitle();const desc=getShareDesc();const friendOk=await callWechatShare('updateAppMessageShareData',{title,desc,link,imgUrl});const timelineOk=await callWechatShare('updateTimelineShareData',{title,link,imgUrl});return friendOk||timelineOk}
async function initWechatShare(){const env=detectShareEnv();if(!env.isWechat||typeof wx==='undefined'||!SHARE_CONFIG.wechatSignUrl)return false;const pageUrl=getCanonicalPageUrl();if(shareState.wechatReady&&shareState.wechatConfigUrl===pageUrl)return true;if(shareState.wechatInitPromise&&shareState.wechatConfigUrl===pageUrl)return shareState.wechatInitPromise;shareState.wechatConfigUrl=pageUrl;shareState.wechatInitPromise=(async()=>{try{const signData=await getWechatSignature(pageUrl);const ready=await new Promise(resolve=>{try{wx.config({debug:false,appId:signData.appId,timestamp:Number(signData.timestamp),nonceStr:signData.nonceStr,signature:signData.signature,jsApiList:['updateAppMessageShareData','updateTimelineShareData']});wx.ready(()=>resolve(true));wx.error(()=>resolve(false));}catch(error){resolve(false)}});shareState.wechatReady=ready;return ready}catch(error){shareState.wechatReady=false;return false}})();return shareState.wechatInitPromise}
function tryQQShare(){return new Promise(resolve=>{try{if(window.mqq&&window.mqq.ui&&typeof window.mqq.ui.shareMessage==='function'){window.mqq.ui.shareMessage({share_type:0,title:getShareTitle(),desc:getShareDesc(),share_url:getShareLink(),image_url:getShareImageUrl(),back:true},()=>resolve(true));return}if(window.mqq&&window.mqq.data&&typeof window.mqq.data.setShareInfo==='function'){window.mqq.data.setShareInfo({title:getShareTitle(),desc:getShareDesc(),share_url:getShareLink(),image_url:getShareImageUrl()});resolve(true);return}}catch(error){}resolve(false)})}
function updateAvatarPreview(dataUrl){const preview=document.getElementById('avatar-preview');if(dataUrl){preview.innerHTML=`<img src="${dataUrl}" alt="头像">`}else{preview.textContent='🎓'}}
document.getElementById('avatar-input').addEventListener('change',event=>{const file=event.target.files&&event.target.files[0];if(!file){userProfile.avatar='';updateAvatarPreview('');return}const reader=new FileReader();reader.onload=()=>{userProfile.avatar=reader.result;updateAvatarPreview(reader.result)};reader.readAsDataURL(file)});
function startTest(){userProfile.nickname=getDisplayName();currentQuestion=0;currentScores=createInitialScores();currentResult=null;isSelecting=false;localStorage.removeItem(STORAGE_KEYS.submitted);showPage('page-test');renderQuestion()}
function renderQuestion(){const q=QUESTIONS[currentQuestion];document.getElementById('question-type').textContent=q.type;document.getElementById('question-scene').textContent=q.scene;document.getElementById('question-dimension').textContent='学院特质打分';document.getElementById('question-text').textContent=q.text;document.getElementById('question-hint').textContent=q.hint;document.getElementById('progress-fill').style.width=((currentQuestion+1)/QUESTIONS.length*100)+'%';document.getElementById('progress-text').textContent=(currentQuestion+1)+'/'+QUESTIONS.length;document.getElementById('options').innerHTML=q.options.map(opt=>`<button class="option" onclick="selectOption('${opt.academy}', this)"><span class="option-label">${opt.label}</span><div class="option-copy">${opt.text}</div></button>`).join('')}
function selectOption(academyKey,element){if(isSelecting)return;isSelecting=true;document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));element.classList.add('selected');currentScores[academyKey]=(currentScores[academyKey]||0)+1;setTimeout(()=>{currentQuestion+=1;isSelecting=false;if(currentQuestion<QUESTIONS.length){renderQuestion()}else{calculateResult()}},220)}
function calculateResult(){const sorted=ACADEMIES.map(item=>({...item,score:currentScores[item.key]||0})).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name,'zh-CN'));const academy=sorted[0];currentResult={resultId:'result_'+Date.now(),academyKey:academy.key,academyName:academy.name,campusRole:academy.name,academySlogan:academy.slogan,sectName:academy.sect,icon:academy.icon,traits:academy.traits,major:academy.major,club:academy.club,keywords:academy.keywords,nickname:getDisplayName(),avatar:userProfile.avatar||'',description:`${academy.name}｜${academy.slogan}\n${academy.traits}\n推荐你加入${academy.major}，顺手去${academy.club}发光。`,shareSubtitle:`${academy.sect}门派同学的校园录取通知书`};localStorage.setItem(STORAGE_KEYS.result,JSON.stringify(currentResult));updateResultPage();showPage('page-result');submitResult(currentResult)}
function setAvatar(containerId,dataUrl,fallback='🎓'){const el=document.getElementById(containerId);if(dataUrl){el.innerHTML=`<img src="${dataUrl}" alt="头像">`}else{el.textContent=fallback}}
function updateResultPage(){document.getElementById('result-badge').textContent=currentResult.icon;document.getElementById('result-sect').textContent=currentResult.sectName;document.getElementById('result-title').textContent=currentResult.academyName;document.getElementById('result-slogan').textContent=currentResult.academySlogan;document.getElementById('keyword-list').innerHTML=currentResult.keywords.map(item=>`<span class="keyword-chip">${item}</span>`).join('');document.getElementById('result-desc').textContent=currentResult.traits;document.getElementById('result-major').textContent=currentResult.major;document.getElementById('result-club').textContent=currentResult.club;document.getElementById('invite-card').innerHTML=`<strong>${EXPO_INFO.title}</strong><br>时间：${EXPO_INFO.date}<br>地点：${EXPO_INFO.location}<br>小红书：${EXPO_INFO.account}`;document.getElementById('result-user-name').textContent=currentResult.nickname;setAvatar('result-user-avatar',currentResult.avatar);applyWechatShareData()}
function getLocalRankingData(){const saved=JSON.parse(localStorage.getItem(STORAGE_KEYS.ranking)||'{}');if(saved.items&&Array.isArray(saved.items))return saved;return{total:0,source:'local',updatedAt:'',items:ACADEMIES.map(item=>({name:item.name,sect:item.sect,icon:item.icon,count:0,ratio:0}))}}
function saveLocalRankingResult(result){const ranking=getLocalRankingData();ranking.total=(ranking.total||0)+1;ranking.source='local';ranking.updatedAt=new Date().toISOString();const target=ranking.items.find(item=>item.name===result.academyName);if(target)target.count+=1;ranking.items.forEach(item=>item.ratio=ranking.total?item.count/ranking.total:0);ranking.items.sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name,'zh-CN'));localStorage.setItem(STORAGE_KEYS.ranking,JSON.stringify(ranking));currentRanking=ranking;return ranking}
async function fetchWithTimeout(url,options={}){const controller=new AbortController();const id=setTimeout(()=>controller.abort(),API_CONFIG.timeout);try{const response=await fetch(url,{...options,signal:controller.signal});clearTimeout(id);return response}catch(error){clearTimeout(id);throw error}}
async function submitResult(result){if(localStorage.getItem(STORAGE_KEYS.submitted)===result.resultId)return;const payload={resultId:result.resultId,academyName:result.academyName,campusRole:result.campusRole,sectName:result.sectName,clientId:getClientId(),timestamp:Date.now()};try{const response=await fetchWithTimeout(API_CONFIG.submitUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!response.ok)throw new Error('submit failed');localStorage.setItem(STORAGE_KEYS.submitted,result.resultId);await loadRanking()}catch(error){saveLocalRankingResult(result);localStorage.setItem(STORAGE_KEYS.submitted,result.resultId)}}
function normalizeRankingResponse(data){const items=Array.isArray(data.items)?data.items:[];return{total:Number(data.total||0),source:data.source||'remote',updatedAt:data.updatedAt||'',items:ACADEMIES.map(item=>{const hit=items.find(row=>row.name===item.name);return{name:item.name,sect:item.sect,icon:item.icon,count:hit?Number(hit.count||0):0,ratio:hit?Number(hit.ratio||0):0}}).sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name,'zh-CN'))}}
async function loadRanking(){try{const response=await fetchWithTimeout(API_CONFIG.rankingUrl);if(!response.ok)throw new Error('ranking failed');const data=await response.json();const normalized=normalizeRankingResponse(data);localStorage.setItem(STORAGE_KEYS.ranking,JSON.stringify(normalized));currentRanking=normalized;return normalized}catch(error){currentRanking=getLocalRankingData();return currentRanking}}
async function showRank(){showPage('page-rank');document.getElementById('rank-status').textContent='正在读取全站榜单...';const ranking=await loadRanking();renderRank(ranking)}
function renderRank(ranking){const total=ranking.total||0;const maxCount=Math.max(...ranking.items.map(item=>item.count),1);const currentName=currentResult?currentResult.academyName:'';document.getElementById('total-count').textContent=total;document.getElementById('rank-status').textContent=ranking.source==='remote'?`全站榜单已更新${ranking.updatedAt?' · '+formatTime(ranking.updatedAt):''}`:'榜单暂时加载失败，当前展示的是最近一次缓存数据。';document.getElementById('rank-list').innerHTML=ranking.items.map((item,index)=>`<div class="rank-item ${item.name===currentName?'current':''}"><div class="rank-num ${index<3?'top3':''}">${index+1}</div><div class="rank-icon">${item.icon}</div><div class="rank-info"><div class="rank-school">${item.name}${item.name===currentName?' · 你的结果':''}</div><div class="rank-count">${item.sect} · ${item.count} 人 · ${total?Math.round(item.count/total*100):0}%</div></div><div class="rank-bar"><div class="rank-bar-fill" style="width:${item.count/maxCount*100}%"></div></div></div>`).join('')}
function formatTime(value){if(!value)return'';const date=new Date(value);if(Number.isNaN(date.getTime()))return'';const y=date.getFullYear();const m=String(date.getMonth()+1).padStart(2,'0');const d=String(date.getDate()).padStart(2,'0');const h=String(date.getHours()).padStart(2,'0');const min=String(date.getMinutes()).padStart(2,'0');return`${y}-${m}-${d} ${h}:${min}`}
function showResult(){if(!currentResult){const saved=localStorage.getItem(STORAGE_KEYS.result);if(saved){currentResult=JSON.parse(saved);updateResultPage()}}showPage('page-result')}
function restartTest(){startTest()}

function generateShareImage(isXHS=false){const topRanking=getRankingForShare();const shareTraits=currentResult.traits.replace(/\n/g,'<br>');if(isXHS){return`<div class="xhs-shell"><img class="xhs-title-image" src="./下课铃素材/下课铃-文字.png" alt="下课铃" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"><div class="xhs-title-text">下课铃</div><div class="xhs-subtitle">你的剑三大学城录取通知书</div><div class="xhs-block"><div class="xhs-rank-item"><div class="share-avatar" style="width:96px;height:96px;border-radius:28px;font-size:42px;">${getShareAvatarMarkup()}</div><div><div class="xhs-role" style="font-size:40px;margin-bottom:6px;">${currentResult.nickname}</div><div class="xhs-desc" style="font-size:24px;">专属学生证持有人</div></div></div></div><div class="xhs-result"><div class="xhs-badge">${currentResult.icon}</div><div class="xhs-role">${currentResult.academyName}</div><div class="xhs-sect">${currentResult.sectName} · ${currentResult.academySlogan}</div><div class="xhs-desc">${shareTraits}<br>推荐专业：${currentResult.major}<br>推荐社团：${currentResult.club}</div></div><div class="xhs-block"><div class="xhs-block-title">学院选择比例</div>${topRanking.map((item,index)=>`<div class="xhs-rank-item"><span style="width:32px;font-weight:900;color:${index===0?'#406bac':'#6f7a90'};">${index+1}</span><span style="font-size:36px;">${item.icon}</span><span style="flex:1;">${item.name}</span><span style="color:#6f7a90;">${item.count}人</span></div>`).join('')}</div><div class="xhs-block"><div class="xhs-block-title">${EXPO_INFO.title}</div><div class="xhs-desc">时间：${EXPO_INFO.date}<br>地点：${EXPO_INFO.location}<br>小红书：${EXPO_INFO.account}</div></div><div class="xhs-footer">来剑三大学城报到，领取你的专属学生证。</div></div>`}return`<div class="share-shell"><div class="share-head"><div><img class="share-brand" src="./下课铃素材/下课铃-文字.png" alt="下课铃" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"><div class="share-brand-fallback">下课铃</div><div class="share-sub">你的剑三大学城录取通知书</div></div><img class="share-logo" src="./下课铃素材/下课铃-logo.png" alt="logo"></div><div class="share-user"><div class="share-avatar">${getShareAvatarMarkup()}</div><div><div class="share-user-name">${currentResult.nickname}</div><div class="share-user-sub">专属学生证持有人</div></div></div><div class="share-result"><div class="share-badge">${currentResult.icon}</div><div class="share-role">${currentResult.academyName}</div><div class="share-sect">${currentResult.sectName} · ${currentResult.academySlogan}</div><div class="share-desc">${shareTraits}</div><div class="share-keywords">${currentResult.keywords.map(item=>`<span class="share-keyword">${item}</span>`).join('')}</div></div><div class="share-rank"><div class="share-rank-title">学院选择比例</div>${topRanking.slice(0,3).map((item,index)=>`<div class="share-rank-item"><span class="share-rank-num">${index+1}</span><span style="font-size:20px;">${item.icon}</span><span style="flex:1;">${item.name}</span><span style="color:#6f7a90;">${item.count}人</span></div>`).join('')}</div><div class="share-invite"><div class="share-invite-title">${EXPO_INFO.title}</div><div class="share-invite-copy">时间：${EXPO_INFO.date}<br>地点：${EXPO_INFO.location}<br>小红书：${EXPO_INFO.account}</div></div><div class="share-footer">5.23 南京见，来剑三大学城报到。</div></div>`}
async function exportCanvas(container,options,filename,successText){try{const canvas=await html2canvas(container,options);canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const link=document.createElement('a');link.download=filename;link.href=url;link.click();URL.revokeObjectURL(url);showToast(successText)},'image/png')}catch(error){showToast('图片生成失败，请稍后再试')}}
async function saveResultImage(){if(!currentResult)return;showToast('正在生成结果图...');const container=document.getElementById('share-image');container.innerHTML=generateShareImage(false);await exportCanvas(container,{backgroundColor:'#fff8f2',scale:2,useCORS:true},'下课铃-结果图.png','结果图已保存到本地')}
async function shareToFriend(){if(!currentResult)return;const env=detectShareEnv();if(env.isWechat){showToast('正在准备微信好友分享...');const ok=await applyWechatShareData();if(ok){showToast('已准备好分享内容，请点右上角分享给好友');return}}if(env.isQQ){showToast('正在准备QQ好友分享...');const ok=await tryQQShare();if(ok){showToast('已准备好分享内容，请在QQ内完成发送');return}}showToast('正在生成好友分享图...');const container=document.getElementById('share-image');container.innerHTML=generateShareImage(false);await exportCanvas(container,{backgroundColor:'#fff8f2',scale:2,useCORS:true},'下课铃-分享给好友.png','图片已保存，请发送给好友')}
async function shareToTimeline(){if(!currentResult)return;const env=detectShareEnv();if(env.isWechat){showToast('正在准备朋友圈分享...');const ok=await applyWechatShareData();if(ok){showToast('已准备好朋友圈配图，请点右上角分享到朋友圈');return}}showToast('正在生成朋友圈配图...');const container=document.getElementById('xhs-share');container.innerHTML=generateShareImage(true);await exportCanvas(container,{backgroundColor:'#fff8f2',scale:1,width:1080,height:container.scrollHeight,useCORS:true},'下课铃-朋友圈结果卡.png','已准备好朋友圈配图，请手动发圈')}
(async function init(){const savedResult=localStorage.getItem(STORAGE_KEYS.result);if(savedResult){currentResult=JSON.parse(savedResult);userProfile.nickname=currentResult.nickname||'';userProfile.avatar=currentResult.avatar||'';document.getElementById('nickname-input').value=userProfile.nickname;updateAvatarPreview(userProfile.avatar);updateResultPage()}currentRanking=await loadRanking()})();
</script>
</body>
